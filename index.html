<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>舞团模特Wiki</title>
  <link rel="stylesheet" href="https://unpkg.com/docsify/themes/vue.css">
  <style>
    body { background: #111; color: #ddd; }
    .sidebar { background: #1a1a1a; }
    .markdown-section h1, h2 { color: #ff4d94; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '舞团模特Wiki',
      repo: '你的用户名/仓库名',
      themeColor: '#ff4d94',
      loadSidebar: true,
      subMaxLevel: 3,
      search: { paths: 'auto', placeholder: '搜索模特/舞团/艺名' },
      coverpage: true,
      onlyCover: false,
      homepage: 'README.md',
      // 可选：加密码保护（后面我再给你代码）
    }
  </script>
  <script src="https://unpkg.com/docsify/lib/docsify.min.js"></script>
  <script src="https://unpkg.com/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
